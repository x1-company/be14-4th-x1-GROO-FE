<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groo</title>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      
      /* 기본 낮 배경 */
      body.daytime {
        background: linear-gradient(135deg, #d7d788, #a2be84, #419e79);
      }
      
      /* 밤 배경 */
      body.nighttime {
        background: linear-gradient(135deg, #7ec7c1, #0b2e35);
      }

      /* 별 스타일 */
      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.8;
        animation: twinkle 2s infinite alternate;
        pointer-events: none;
      }

      /* 깜빡이는 효과 */
      @keyframes twinkle {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
      }
    </style>
  </head>

  <body>
    <div id="app"></div>

    <script type="module" src="/src/main.js"></script>

    <script>
      const hour = new Date().getHours()
      
      // if (false) {

        if (hour >= 6 && hour < 18) {
        // 6시 ~ 18시: 낮
        document.body.classList.add('daytime')
      } else {
        // 18시 ~ 다음날 6시: 밤
        document.body.classList.add('nighttime')

        // 별 생성
        const starCount = 100
        for (let i = 0; i < starCount; i++) {
          const star = document.createElement('div')
          star.className = 'star'
          star.style.top = `${Math.random() * 100}vh`
          star.style.left = `${Math.random() * 100}vw`
          const size = `${Math.random() * 3 + 1}px`
          star.style.width = size
          star.style.height = size
          document.body.appendChild(star)
        }
      }
    </script>
  </body>
</html>
